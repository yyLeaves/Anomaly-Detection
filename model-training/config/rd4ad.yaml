# RD4AD (Reverse Distillation) training / extraction config

model:
  name: rd4ad                     # must match a key in MODEL_REGISTRY
  backbone: wide_resnet50_2
  layers:
    - layer1
    - layer2
    - layer3
  pre_processor: true
  post_processor: true
  learning_rate: 0.001

train:
  epochs: 100
  batch_size: 16
  num_workers: 8
  accelerator: gpu                # gpu | cpu | mps
  seed: 42
  # Paths — override on the command line with --data_root / --output_root / --name
  data_root: ./datasets/synth23_pelvis_v7_png
  output_root: ./results/rd4ad
  name: ~                         # required: experiment name (output sub-folder)

extract:
  split: test                     # test | valid
  batch_size: 16
  gpu: 0                          # -1 for CPU
  map_size: 224
  mask_threshold: 0.5
  mask_output_format: png         # png | nifti
  # checkpoint path is supplied via --checkpoint on the CLI
