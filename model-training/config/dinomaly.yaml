# Dinomaly config
# Reference: Guo et al. (2025)
# Uses a frozen DINOv2 encoder (ViT-Base with register tokens) by default.
# Encoder weights are downloaded automatically by timm on first run.

model:
  name: dinomaly
  encoder_name: dinov2reg_vit_base_14   # ViT-Base with register tokens (default)

train:
  epochs: 100
  batch_size: 8
  num_workers: 8
  accelerator: gpu            # gpu | cpu | mps
  gpu: 0
  seed: 42
  data_root: ./datasets/synth23_pelvis_v7_png
  output_root: ./results/dinomaly
  name: ~                     # required: experiment name

extract:
  split: test                 # test | valid
  batch_size: 32
  gpu: 0
  map_size: 224
  mask_threshold: 0.5
  mask_output_format: png     # png | nifti
