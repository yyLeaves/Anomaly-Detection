# PatchCore training / extraction config
# Reference: BMAD/config/*_patchcore.yaml + anomalib_cfa_gpu_png_image_AU.ipynb

model:
  name: patchcore
  backbone: resnet18
  layers:
    - layer2
    - layer3
  # learning_rate is not used (memory-bank method — no gradient training)
  pre_processor: ~     # null → anomalib default
  post_processor: ~

train:
  epochs: 1            # PatchCore only needs a single feature extraction pass
  batch_size: 32
  num_workers: 8
  accelerator: cpu
  seed: 42
  data_root: ./datasets/synth23_pelvis_v7_png
  output_root: ./results/patchcore
  name: ~              # required: experiment name

extract:
  split: test          # test | valid
  batch_size: 32
  gpu: 0
  # checkpoint path is supplied via --checkpoint on the CLI
